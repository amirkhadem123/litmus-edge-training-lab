<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Litmus Lab{% endblock %}</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f0e8;
      color: #2c2318;
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: #7a5230; text-decoration: none; }
    a:hover { text-decoration: underline; color: #5c3c22; }

    /* ── Header ───────────────────────────────────────────────────────── */
    .header {
      background: #e8dfd0;
      border-bottom: 1px solid #c8bfaf;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .header-logo {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2c2318;
      letter-spacing: -0.4px;
    }
    .header-logo span { color: #9c6b2e; }
    .header-nav { display: flex; gap: 1rem; margin-left: auto; }
    .header-nav a {
      font-size: 0.85rem;
      color: #7a6e62;
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
    }
    .header-nav a:hover { background: #ddd5c5; color: #2c2318; text-decoration: none; }

    /* ── Layout ───────────────────────────────────────────────────────── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.82; text-decoration: none; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: #7a5230; color: #fdf8f0; }
    .btn-success  { background: #4a7a4e; color: #fdf8f0; }
    .btn-danger   { background: #9c3030; color: #fdf8f0; }
    .btn-warning  { background: #9c6b2e; color: #fdf8f0; }
    .btn-ghost    { background: #ede8df; color: #5a4e42; border: 1px solid #c8bfaf; }

    /* ── Badges ───────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge-open     { background: #d4e4f0; color: #2a5478; }
    .badge-solved   { background: #d4edda; color: #2a5c38; }
    .badge-escalate { background: #f5ddd0; color: #7c3d20; }
    .badge-beginner     { background: #d4edda; color: #2a5c38; }
    .badge-intermediate { background: #fdecd0; color: #7c4e10; }
    .badge-advanced     { background: #e8d8f0; color: #5c3478; }

    /* ── Alert boxes ──────────────────────────────────────────────────── */
    .alert {
      padding: 0.85rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      border-left: 4px solid;
    }
    .alert-warning { background: #fdf0d8; border-color: #c87820; color: #7c4e10; }
    .alert-info    { background: #ddeef8; border-color: #4a82a8; color: #2a4e6c; }
    .alert-success { background: #ddf0e0; border-color: #3a8044; color: #1e4a28; }
    .alert-error   { background: #f8ddd8; border-color: #a83030; color: #6c1e1e; }

    /* ── Form elements ────────────────────────────────────────────────── */
    input[type="text"], select, textarea {
      background: #fdf8f0;
      border: 1px solid #c8bfaf;
      border-radius: 6px;
      color: #2c2318;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      width: 100%;
    }
    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #9c6b2e;
      box-shadow: 0 0 0 2px rgba(156, 107, 46, 0.15);
    }
    select option { background: #fdf8f0; }
    label {
      font-size: 0.85rem;
      color: #7a6e62;
      display: block;
      margin-bottom: 0.3rem;
    }
    .form-group { margin-bottom: 1.25rem; }

    /* ── Spinner ──────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(44, 35, 24, 0.2);
      border-top-color: #2c2318;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Misc ─────────────────────────────────────────────────────────── */
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .text-muted { color: #8a7e72; font-size: 0.85rem; }
    hr { border: none; border-top: 1px solid #d8d0c0; margin: 1.5rem 0; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

  <header class="header">
    <div class="header-logo"><span>Litmus</span> Lab</div>
    <nav class="header-nav">
      <a href="/">Ticket Queue</a>
      <a href="/new">+ New Ticket</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}

</body>
</html>
